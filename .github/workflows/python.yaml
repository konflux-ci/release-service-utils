---
name: Python Checks for Pull Requests
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]
jobs:
  python:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install OS packages
        # libkrb5-dev is required for gssapi dependency installation (krb5-config command)
        run: |
          sudo apt-get -y update
          sudo apt-get install -y libkrb5-dev
      - name: Check out repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - name: Black Lint
        uses: psf/black@d246367ab471cd56298407858661d475c33b3e36  # stable
      - name: Setup python environment for flake8 check
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"  # Same as in Dockerfile
      - name: flake8 Lint
        uses: py-actions/flake8@84ec6726560b6d5bd68f2a5bed83d62b52bb50ba  # v2
      - name: Run pytest with coverage
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --dev
          uv run pytest --cov=. --cov-report=xml:coverage.xml
      - name: docstring test
        run: |
          # Get list of changed python files
          pip install ruff
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files.[].path')
          PYFILES=""
          for _file in ${FILES}; do
            echo "Checking file : $_file"
            if [[ $(file --mime-type "$_file" | cut -d" " -f 2) == "text/x-script.python" ]]; then
              PYFILES="$PYFILES $_file "
            else
              echo "Skipping non-python file: $_file"
            fi
          done
          if [ -z "$PYFILES" ]; then
            echo "No Python files changed."
          else
            echo "Running ruff on: $PYFILES"
            ruff check --select D ${PYFILES}
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
