---
name: Python Checks for Pull Requests
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Install OS packages
        # libkrb5-dev is required for gssapi dependency installation (krb5-config command)
        run: |
          sudo apt-get -y update
          sudo apt-get install -y libkrb5-dev
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Black Lint
        uses: psf/black@9fd9ea2835973981e3f5dc5b8eb76f2ded46aa61  # stable
      - name: Setup python environment for flake8 check
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.9"  # Same as in Dockerfile
      - name: flake8 Lint
        uses: py-actions/flake8@84ec6726560b6d5bd68f2a5bed83d62b52bb50ba  # v2
      - name: Run pytest with coverage
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --dev
          uv run pytest --cov=. --cov-report=xml:coverage.xml
      - name: docstring test
        run: |
          # Get list of changed python files
          pip install ruff
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
            HEAD_SHA="${{ github.event.merge_group.head_sha }}"
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi
          echo "Checking files changed between $BASE_SHA and $HEAD_SHA"
          FILES=$(git diff --name-only --diff-filter=ACMRT "${BASE_SHA}...${HEAD_SHA}" | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No Python files changed."
          else
            PYFILES=""
            for _file in ${FILES}; do
              echo "Checking file : $_file"
              if [[ $(file --mime-type "$_file" | cut -d" " -f 2) == "text/x-script.python" ]]; then
                PYFILES="$PYFILES $_file "
              else
                echo "Skipping non-python file: $_file"
              fi
            done
            if [ -z "$PYFILES" ]; then
              echo "No Python files changed."
            else
              echo "Running ruff on: $PYFILES"
              ruff check --select D ${PYFILES}
            fi
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
